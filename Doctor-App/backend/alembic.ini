# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to clone to slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported
# relative to the alembic directory
# prepend_sys_path = {sys_path}

# version location specification; this defaults
# to alembic/versions.  when using multiple version
# directories, paths must be comma separated
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; as above, this defaults to the character partners
# for the operating system, e.g. ';' on Windows, ':' on Unix.
# version_path_separator = :

# set to 'true' to search source files recursively for migrations
# recursive_version_locations = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

# sqlalchemy.url will be dynamically loaded in env.py from the settings module
sqlalchemy.url = sqlite:///./doctor_app.db


[post_write_hooks]
# post_write_hooks defines scripts or behavior that is run after a script is written.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5s: %(message)s
datefmt = %H:%M:%S
